name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Protobuf types
        run: pnpm proto:generate

      - name: Build
        run: pnpm build

      - name: Test
        run: pnpm test

  python-agent:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/robot-agent-py
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: packages/robot-agent-py/requirements.txt

      - name: Install system deps for MuJoCo
        run: |
          sudo apt-get update
          sudo apt-get install -y libegl1-mesa libgl1-mesa-glx libosmesa6

      - name: Install Python dependencies
        run: pip install -e ".[test]"

      - name: Run Python tests
        env:
          MUJOCO_GL: osmesa
        run: pytest -v
